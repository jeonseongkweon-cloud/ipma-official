<html lang="ko">
<head>

  <title>IPMA | 임원 소개</title>
  <meta name="description" content="International Police Martial Arts Alliance(IPMA) 임원 소개" />

  <!-- OG -->
  <meta property="og:title" content="IPMA | 임원 소개" />
  <meta property="og:description" content="구조 >> 교차원리, 교차원리 기반 무도" />
  <meta property="og:type" content="website" />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a30;
      --ink:#eaf0ff;
      --muted:#a9b6d3;
      --line:rgba(255,255,255,.10);
      --gold:#d8b15a;
      --blue:#5aa7ff;
      --shadow: 0 14px 40px rgba(0,0,0,.45);
      --radius:18px;
      --radius2:26px;
      --max: 1120px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(90,167,255,.18), transparent 60%),
        radial-gradient(900px 600px at 85% 10%, rgba(216,177,90,.14), transparent 55%),
        var(--bg);
      color:var(--ink);
      line-height:1.55;
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:var(--max); margin:0 auto; padding:22px 16px 70px}

    /* Top */
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:14px 14px;
      border:1px solid var(--line);
      border-radius:var(--radius2);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      position:sticky; top:10px; z-index:20;
      backdrop-filter: blur(10px);
    }
    .brand{display:flex; align-items:center; gap:12px; min-width:0;}
    .mark{
      width:44px; height:44px; border-radius:14px;
      border:1px solid var(--line);
      background: linear-gradient(135deg, rgba(216,177,90,.22), rgba(90,167,255,.16));
      display:grid; place-items:center; flex:0 0 auto;
    }
    .mark span{font-weight:900; letter-spacing:.5px; color:var(--gold);}
    .brand h1{
      margin:0; font-size:16px; letter-spacing:.2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .brand p{
      margin:2px 0 0; font-size:12px; color:var(--muted);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .rightBox{display:flex; align-items:center; gap:10px; flex:0 0 auto;}
    .homeBtn{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      transition:.2s transform, .2s background;
      font-size:13px;
    }
    .homeBtn:hover{transform: translateY(-1px); background: rgba(255,255,255,.06)}
    .dot{
      width:8px; height:8px; border-radius:50%;
      background: var(--blue);
      box-shadow: 0 0 0 4px rgba(90,167,255,.12);
    }

    /* Lang toggle */
    .toggle{
      display:inline-flex;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background: rgba(255,255,255,.02);
    }
    .tbtn{
      appearance:none; border:0; margin:0;
      padding:10px 12px;
      font-size:12px;
      color:var(--muted);
      background: transparent;
      cursor:pointer;
      transition:.2s background, .2s color;
      display:inline-flex; align-items:center; gap:8px;
    }
    .tbtn:hover{background: rgba(255,255,255,.05)}
    .tbtn.active{
      color: var(--ink);
      background: linear-gradient(180deg, rgba(216,177,90,.20), rgba(255,255,255,.02));
    }

    /* Hero */
    .hero{
      margin-top:18px;
      padding:22px 18px;
      border-radius:var(--radius2);
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
    }
    .kicker{
      display:inline-flex; align-items:center; gap:10px;
      padding:7px 11px; border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-size:12px;
    }
    .kicker b{color:var(--gold)}
    .hero h2{margin:12px 0 8px; font-size:22px; letter-spacing:.2px;}
    .hero .sub{margin:0; color:var(--muted); font-size:14px;}

    /* ✅ Single layout */
    .grid{
      margin-top:16px;
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:var(--radius2);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHead{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background: rgba(0,0,0,.12);
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      flex-wrap:wrap;
    }
    .cardHead h3{margin:0; font-size:15px}
    .tag{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
    }
    .cardBody{padding:14px 16px}

    /* Controls */
    .controls{
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .select{
      border:1px solid var(--line);
      background: rgba(255,255,255,.02);
      color: var(--ink);
      border-radius:14px;
      padding:10px 12px;
      font-size:12px;
      outline:none;
    }
    .hint{
      color: var(--muted);
      font-size:12px;
    }

    /* Leader list */
    .leaders{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 720px){
      .leaders{grid-template-columns:1fr}
      .topbar{position:relative; top:auto}
    }

    .person{
      display:flex; gap:12px; align-items:stretch;
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      transition:.2s transform, .2s border;
      min-height: 126px;
    }
    .person:hover{transform: translateY(-2px); border-color: rgba(216,177,90,.35)}
    .avatar{
      width:82px; height:98px;
      border-radius:16px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      overflow:hidden;
      flex:0 0 auto;
    }
    .avatar img{width:100%; height:100%; object-fit:cover; display:block}
    .pInfo{min-width:0; display:flex; flex-direction:column; gap:6px; flex:1}
    .pName{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
    .pName strong{font-size:15px}
    .pill{
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--line);
      color:var(--muted);
      background: rgba(255,255,255,.02);
      white-space:nowrap;
    }
    .role{color:var(--gold); font-size:13px}
    .meta{color:var(--muted); font-size:12px; display:flex; flex-direction:column; gap:3px}
    .links{display:flex; gap:8px; flex-wrap:wrap; margin-top:auto}
    .btn{
      display:inline-flex; align-items:center; gap:8px;
      font-size:12px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      transition:.2s transform, .2s background;
    }
    .btn:hover{transform: translateY(-1px); background: rgba(255,255,255,.06)}
    .btn .ico{
      width:8px; height:8px; border-radius:50%;
      background: var(--blue);
      box-shadow: 0 0 0 4px rgba(90,167,255,.12);
    }

    footer{
      margin-top:16px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      opacity:.95;
    }
    .line{margin:12px auto 0; max-width:560px; height:1px; background: var(--line);}
  </style>
</head>

        <div class="mark"><span>IPMA</span></div>

        </div>
      </div>

      <div class="rightBox">
        <div class="toggle" aria-label="Language">

          <button class="tbtn" id="btnEn" type="button">EN</button>

        <a class="homeBtn" href="../">

          홈으로

    </div>

    <!-- Hero -->
    <section class="hero">
      <div class="kicker"><b>구조</b> >> 교차원리, 교차원리 기반 무도</div>
      <h2 id="heroTitle">임원 소개</h2>
      <p class="sub" id="heroSub">
        IPMA의 운영과 발전을 함께하는 임원진을 소개합니다.

    <div class="grid">

      <section class="card">
        <div class="cardHead">
          <h3 id="sectionTitle">임원진</h3>
          <div class="controls">
            <select class="select" id="groupFilter" aria-label="filter">
              <option value="ALL">전체 보기</option>
            </select>
            <span class="hint" id="hintText">직책 기준 자동 정렬 적용됨</span>
            <div class="tag" id="tagText">Official · Auto Sort · KO/EN</div>
          </div>
        </div>

        <div class="cardBody">
          <div id="leaders" class="leaders"></div>
        </div>
      </section>

    </div>

    <footer>
      <div class="line"></div>
      <p>© <span id="year"></span> IPMA · International Police Martial Arts Alliance</p>
    </footer>

  </div>

  <script>
    // =========================================================
    // ✅ EDIT ZONE (여기만 수정하면 됩니다)
    // - titleKo/titleEn, groupKo/groupEn, linesKo/linesEn, links
    // - 직책 자동 정렬은 rankKey(한글 직책 문자열)에 따라 동작합니다.

        titleKo: "국제경찰무도연합회 이사",
        titleEn: "Board Member of IPMA",
        rankKey: "이사",

        ],
        links: []

    ];
    // =========================================================
    // ✅ EDIT ZONE 끝
    // =========================================================

    // 직책 우선순위(낮을수록 위)
    const RANK_ORDER = {
      "명예총재/이사장": 0,
      "명예총재": 1,
      "이사장": 2,
      "총재": 3,
      "원장": 4,
      "최고위원": 5,
      "부총재": 6,
      "이사": 7,
      "기타": 99
    };

    const $leaders = document.getElementById("leaders");
    const $year = document.getElementById("year");
    const $groupFilter = document.getElementById("groupFilter");
    const $btnKo = document.getElementById("btnKo");
    const $btnEn = document.getElementById("btnEn");

    const $topSub = document.getElementById("topSub");
    const $heroTitle = document.getElementById("heroTitle");
    const $heroSub = document.getElementById("heroSub");
    const $sectionTitle = document.getElementById("sectionTitle");
    const $hintText = document.getElementById("hintText");
    const $tagText = document.getElementById("tagText");

    let LANG = "ko"; // 'ko' | 'en'

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getRankScore(p){
      const key = (p.rankKey || "").trim();
      return (key in RANK_ORDER) ? RANK_ORDER[key] : RANK_ORDER["기타"];
    }

    function getGroup(p){
      return LANG === "ko" ? (p.groupKo || "기타") : (p.groupEn || "Others");
    }

    function getName(p){
      return LANG === "ko" ? (p.nameKo || "") : (p.nameEn || p.nameKo || "");
    }

    function getTitle(p){
      return LANG === "ko" ? (p.titleKo || "") : (p.titleEn || p.titleKo || "");
    }

    function getLines(p){
      const arr = LANG === "ko" ? (p.linesKo || []) : (p.linesEn || p.linesKo || []);
      return Array.isArray(arr) ? arr : [];
    }

    function renderLines(lines){
      if(!lines.length) return "";
      return lines.map(l => `<div>• ${escapeHtml(l)}</div>`).join("");
    }

    function renderLinks(links){
      if(!links || !links.length) return "";
      return `
        <div class="links">
          ${links.map(x => `
            <a class="btn" href="${escapeHtml(x.url)}" target="_blank" rel="noopener">
              <span class="ico"></span>${escapeHtml(x.label)}
            </a>
          `).join("")}
        </div>
      `;
    }

    function badgeFromRank(rankKey){
      // 공식 느낌을 위해 직책키를 뱃지로도 표시(너무 과하면 줄여도 됨)
      const label = LANG === "ko" ? rankKey : rankKey; // rankKey는 내부키라 그대로 사용(원하면 영어로 따로 매핑 가능)
      return label ? `<span class="pill">${escapeHtml(label)}</span>` : "";
    }

    function card(p){
      const name = getName(p);
      const title = getTitle(p);
      const lines = getLines(p);
      return `
        <article class="person" data-group="${escapeHtml(getGroup(p))}">
          <div class="avatar">
            <img src="${escapeHtml(p.photo)}" alt="${escapeHtml(name)}" loading="lazy" />
          </div>
          <div class="pInfo">
            <div class="pName">
              <strong>${escapeHtml(name)}</strong>
              ${badgeFromRank(p.rankKey || "")}
            </div>
            <div class="role">${escapeHtml(title)}</div>
            <div class="meta">
              ${renderLines(lines)}
            </div>
            ${renderLinks(p.links)}
          </div>
        </article>
      `;
    }

    function buildGroupOptions(data){
      const groups = Array.from(new Set(data.map(getGroup))).filter(Boolean);
      groups.sort((a,b)=>a.localeCompare(b));
      $groupFilter.innerHTML = `
        <option value="ALL">${LANG==="ko" ? "전체 보기" : "Show All"}</option>
        ${groups.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join("")}
      `;
    }

    function applyFilter(){
      const v = $groupFilter.value;
      const cards = $leaders.querySelectorAll(".person");
      cards.forEach(el => {
        const g = el.getAttribute("data-group") || "";
        el.style.display = (v==="ALL" || g===v) ? "" : "none";
      });
    }

    function render(){
      // 직책 우선순위 + 같은 우선순위는 이름 기준
      const sorted = [...LEADERS].sort((a,b)=>{
        const da = getRankScore(a) - getRankScore(b);
        if(da !== 0) return da;
        return getName(a).localeCompare(getName(b));
      });

      buildGroupOptions(sorted);
      $leaders.innerHTML = sorted.map(card).join("");
      $groupFilter.value = "ALL";
      applyFilter();

      // 문구 (KO/EN)
      if(LANG === "ko"){
        $topSub.textContent = "임원 소개 · Leadership";
        $heroTitle.textContent = "임원 소개";
        $heroSub.textContent = "IPMA의 운영과 발전을 함께하는 임원진을 소개합니다.";
        $sectionTitle.textContent = "임원진";
        $hintText.textContent = "직책 기준 자동 정렬 적용됨";
        $tagText.textContent = "Official · Auto Sort · KO/EN";
        document.title = "IPMA | 임원 소개";
      }else{
        $topSub.textContent = "Leadership";
        $heroTitle.textContent = "Leadership";
        $heroSub.textContent = "Meet the leadership team supporting IPMA's mission and growth.";
        $sectionTitle.textContent = "Leadership Team";
        $hintText.textContent = "Auto-sorted by role priority";
        $tagText.textContent = "Official · Auto Sort · KO/EN";
        document.title = "IPMA | Leadership";
      }
    }

    function setLang(next){
      LANG = next;
      $btnKo.classList.toggle("active", LANG==="ko");
      $btnEn.classList.toggle("active", LANG==="en");
      render();
    }

    $groupFilter.addEventListener("change", applyFilter);
    $btnKo.addEventListener("click", ()=>setLang("ko"));
    $btnEn.addEventListener("click", ()=>setLang("en"));

    $year.textContent = new Date().getFullYear();
    render();
  </script>
</body>
</html>
